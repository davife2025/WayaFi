[toolchain]
anchor_version = "0.31.0"

[features]
resolution = true
skip-lint = false

[programs.devnet]
stablecoin_token = "TokenProg11111111111111111111111111111111111"
treasury_pool    = "TreasuryPo11111111111111111111111111111111111"
transfer_hook    = "TransferHo11111111111111111111111111111111111"
routing_logic    = "RoutingLog11111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
